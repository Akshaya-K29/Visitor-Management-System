<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor QR Pass</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body{
            background:#f2f2f2;
        }

        .card{
            width:420px;
            margin:40px auto;
            padding:20px;
            border-radius:15px;
            text-align:center;
        }

        #qrcode{
            margin:20px auto;
        }
    </style>

</head>
<body>

<div class="card shadow">

<h2>Visitor Pass</h2>

<hr>

<p><b>ID :</b> <span id="id"></span></p>

<p><b>Name :</b> <span id="name"></span></p>

<p><b>Email :</b> <span id="email"></span></p>

<p><b>Company :</b> <span id="company"></span></p>

<p><b>Host :</b> <span id="host"></span></p>

<p><b>Status :</b> <span id="status"></span></p>

<div id="qrcode"></div>

<button class="btn btn-success mt-3" onclick="window.print()">
Print Pass
</button>

<br><br>

<a href="dashboard.html" class="btn btn-primary">
Back to Dashboard
</a>

</div>

<script src="qrpass.js"></script>

</body>
</html>
