<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visitor Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="reports.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">
Visitor Reports
</h2>

<div class="row mb-4">

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h5>Total Visitors</h5>
<h2 id="totalVisitors">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h5>Pending</h5>
<h2 id="pendingVisitors">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h5>Checked In</h5>
<h2 id="checkedInVisitors">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h5>Checked Out</h5>
<h2 id="checkedOutVisitors">0</h2>
</div>
</div>

</div>

<div class="card shadow p-4">

<h4 class="mb-3">
Visitor Statistics
</h4>

<canvas id="reportChart"></canvas>

</div>

<div class="card shadow mt-4 p-3">

<div class="d-flex justify-content-between">

<h4>Visitor Report</h4>

<button class="btn btn-success" onclick="downloadCSV()">
Download CSV
</button>

</div>

<table class="table table-bordered mt-3">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Company</th>
<th>Purpose</th>
<th>Status</th>

</tr>

</thead>

<tbody id="reportTable">

</tbody>

</table>

</div>

</div>

<script src="reports.js"></script>

</body>
</html>
